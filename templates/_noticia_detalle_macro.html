{% macro noticia_detalle(
    id,
    titulo,
    descripcion,
    fecha = none,
    imagen = none
) %}

<div>

    <h1>{{ titulo }}</h1>

    <div>
        {% if fecha %}<span>{{ fecha }}</span>{% endif %}
    </div>

    {% if imagen %}
    <img src="{{ imagen }}" alt="{{ titulo }}">
    {% endif %}

    <div>{{ descripcion }}</div>
</div>

{% endmacro %}
