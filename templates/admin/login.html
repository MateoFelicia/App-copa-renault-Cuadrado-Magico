<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Iniciar sesión</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #f0f0f0;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
            margin: 24px 16px;
        }

        .login-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .login-logo {
            width: 40px;
            height: 40px;
            background: #ffcc00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 13px;
            font-weight: 800;
            color: #000;
            letter-spacing: -0.5px;
        }

        .login-brand { font-size: 14px; font-weight: 700; color: #f0f0f0; }
        .login-sub   { font-size: 12px; color: #666; margin-top: 2px; }

        h1 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }

        .login-desc { font-size: 13px; color: #666; margin-bottom: 24px; }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3b1515;
            border: 1px solid #7a2020;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #f87171;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input::placeholder { color: #444; }
        input:focus { border-color: #ffcc00; }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.15s;
        }

        .btn:hover  { opacity: 0.88; }
        .btn:active { transform: scale(0.98); }
        .input-wrapper {
            position: relative;
        }

        .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #666;
        padding: 0;
        display: flex;
        align-items: center;
        }

        .toggle-password:hover { color: #aaa; }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="login-header">
            <div class="login-logo">CR</div>
            <div>
                <p class="login-brand">Copa Renault</p>
                <p class="login-sub">Panel de administración</p>
            </div>
        </div>

        <h1>Iniciar sesión</h1>
        <p class="login-desc">Solo para administradores autorizados.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="admin@coparenault.com" required autocomplete="username">
        </div>
        <div class="form-group">
    <label for="password">Contraseña</label>
    <div class="input-wrapper">
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="toggle-password" onclick="togglePassword()">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
        </button>
    </div>
</div>
        <button class="btn" id="btn-login" onclick="login()">Ingresar</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBghcZw7DxufSEM2SXdqL8h_RjPZ0Y9Cps",
            authDomain: "copa-renault-afa7c.firebaseapp.com",
            projectId: "copa-renault-afa7c",
            storageBucket: "copa-renault-afa7c.firebasestorage.app",
            messagingSenderId: "696431672147",
            appId: "1:696431672147:web:34e2b8dd383c365919ffa6",
            measurementId: "G-S01VYKQMCX"
        };

        firebase.initializeApp(firebaseConfig);

        async function login() {
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btn-login');
            const errorDiv = document.getElementById('error-msg');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const idToken = await userCredential.user.getIdToken(true);

                const response = await fetch('/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });

                const data = await response.json();

                if (data.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    mostrarError(data.error || 'No autorizado');
                }

            } catch (error) {
                mostrarError('Credenciales incorrectas');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        }

        function mostrarError(msg) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'flex';
        }

        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
    }
    </script>

</body>
</html>
