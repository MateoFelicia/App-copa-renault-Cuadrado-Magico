<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Iniciar sesión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #f0f0f0;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
            margin: 24px 16px;
        }

        .login-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .login-logo {
            width: 40px;
            height: 40px;
            background: #ffcc00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 13px;
            font-weight: 800;
            color: #000;
            letter-spacing: -0.5px;
        }

        .login-brand { font-size: 14px; font-weight: 700; color: #f0f0f0; }
        .login-sub   { font-size: 12px; color: #666; margin-top: 2px; }

        h1 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }

        .login-desc { font-size: 13px; color: #666; margin-bottom: 24px; }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3b1515;
            border: 1px solid #7a2020;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #f87171;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input::placeholder { color: #444; }
        input:focus { border-color: #ffcc00; }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.15s;
        }

        .btn:hover  { opacity: 0.88; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="login-header">
            <div class="login-logo">CR</div>
            <div>
                <p class="login-brand">Copa Renault</p>
                <p class="login-sub">Panel de administración</p>
            </div>
        </div>

        <h1>Iniciar sesión</h1>
        <p class="login-desc">Solo para administradores autorizados.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin-login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="admin@coparenault.com" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button class="btn" type="submit">Ingresar</button>
        </form>

    </div>

</body>
</html>
