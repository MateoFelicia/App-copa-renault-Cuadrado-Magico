{% extends "admin/base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Dashboard</h1>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="num">{{ stats.noticias }}</div>
        <div class="label">Noticias</div>
    </div>
    <div class="stat-card">
        <div class="num">{{ stats.partidos }}</div>
        <div class="label">Partidos</div>
    </div>
    <div class="stat-card">
        <div class="num">{{ stats.categorias }}</div>
        <div class="label">Categorías Cantina</div>
    </div>
    <div class="stat-card">
        <div class="num">{{ stats.sponsors }}</div>
        <div class="label">Sponsors</div>
    </div>
</div>

{% endblock %}
