{% extends "admin/base.html" %}
{% block title %}Noticias{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Noticias</h1>
    <a href="/admin/noticias/nueva" class="btn btn-primary">+ Nueva noticia</a>
</div>

<table>
    <thead>
        <tr><th>Título</th><th>Fecha</th><th>Acciones</th></tr>
    </thead>
    <tbody>
    {% for n in noticias %}
    <tr>
        <td>{{ n.titulo }}</td>
        <td>{{ n.fecha or "—" }}</td>
        <td class="actions">
            <a href="/admin/noticias/{{ n.id }}/editar" class="btn btn-ghost">Editar</a>
            <form action="/admin/noticias/{{ n.id }}/eliminar" method="POST" onsubmit="return confirm('¿Eliminar esta noticia?')">
                <button class="btn btn-danger">Eliminar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
