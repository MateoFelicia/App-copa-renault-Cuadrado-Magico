{% extends "admin/base.html" %}
{% block title %}{{ "Editar" if producto else "Nuevo" }} Producto{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ "Editar" if producto else "Nuevo" }} Producto — {{ cat.nombre }}</h1>
    <a href="/admin/cantina" class="btn btn-ghost">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Nombre</label>
            <input name="nombre" required value="{{ producto.nombre if producto else '' }}">
        </div>
        <div class="form-group">
            <label>Precio</label>
            <input name="precio" type="number" step="0.01" required value="{{ producto.precio if producto else '' }}">
        </div>
        <div class="form-group">
            <label>URL de imagen</label>
            <input name="imagen" value="{{ producto.imagen if producto else '' }}">
        </div>
        <button class="btn btn-primary" type="submit">Guardar</button>
    </form>
</div>
{% endblock %}
