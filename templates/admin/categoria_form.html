{% extends "admin/base.html" %}
{% block title %}{{ "Editar" if categoria else "Nueva" }} Categoría{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ "Editar" if categoria else "Nueva" }} Categoría</h1>
    <a href="/admin/cantina" class="btn btn-ghost">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Nombre</label>
            <input name="nombre" required value="{{ categoria.nombre if categoria else '' }}">
        </div>
        <div class="form-group">
            <label>Orden</label>
            <input name="orden" type="number" value="{{ categoria.orden if categoria else 0 }}">
        </div>
        <div class="form-group form-check">
            <input type="checkbox" name="promo" id="promo" {{ "checked" if categoria and categoria.promo }}>
            <label for="promo" style="margin:0;">¿Es categoría de promociones?</label>
        </div>
        <button class="btn btn-primary" type="submit">Guardar</button>
    </form>
</div>
{% endblock %}
