<!DOCTYPE html>
<html>
<head>
    <title>Usuarios</title>
</head>
<body>

<h1>Lista de usuarios</h1>

<a href="/ingresar">Agregar usuario</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
    </tr>

    {% for u in usuarios %}
    <tr>
        <td>{{ u[0] }}</td>
        <td>{{ u[1] }}</td>
        <td>{{ u[2] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
